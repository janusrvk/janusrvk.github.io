<html lang="nl">
<head>
  <meta charset="UTF-8" />

  <meta property="og:description" content="Persoonlijke website van Janus van Koolwijk. Redacteur en schrijver uit Amsterdam." />
  <meta property="og:url" content="https://janusrvk.com/" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Janus van Koolwijk — Redacteur & Schrijver" />
  <meta name="twitter:description" content="Persoonlijke website van Janus van Koolwijk. Redacteur en schrijver uit Amsterdam." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo+Black&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Cardo:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Janus van Koolwijk",
    "url": "https://janusrvk.com",
    "image": "https://janusrvk.com/brand_assets/GEZICHT.png",
    "description": "Janus van Koolwijk is een freelance redacteur en schrijver uit Amsterdam.",
    "jobTitle": "Freelance Redacteur",
    "worksFor": { "@type": "Organization", "name": "VARAgids" },
    "alumniOf": { "@type": "CollegeOrUniversity", "name": "Universiteit van Amsterdam" },
    "address": { "@type": "PostalAddress", "addressLocality": "Amsterdam", "addressCountry": "NL" },
    "email": "janusrvk@xs4all.nl"
  }
  </script>

  <style>
    :root {
      --bg: #0E0E0E;
      --fg: #F2EFE9;
      --accent: #E85D1F;
      --accent-fg: #0E0E0E;
      --muted: color-mix(in srgb, var(--fg) 64%, transparent);
      --rule: color-mix(in srgb, var(--fg) 14%, transparent);

      /* Klassieke versie brand */
      --klassiek-bg: #F2EFE9;
      --klassiek-fg: #0E0E0E;
      --klassiek-accent: #B23211;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Archivo', 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .splash {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      min-height: 100dvh;
      padding: clamp(18px, 3vw, 28px);
    }

    /* ---------- Top bar ---------- */
    .splash-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-family: 'Archivo Black', sans-serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .splash-topbar-left { display: inline-flex; align-items: center; gap: 10px; }
    .splash-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    /* ---------- Center stage ---------- */
    .splash-stage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: stretch;
      gap: 0;
      position: relative;
      isolation: isolate;
    }

    /* Subtiele verticale deler tussen de twee versies */
    .splash-divider {
      position: absolute;
      top: 10%;
      bottom: 10%;
      left: 50%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
      pointer-events: none;
      z-index: 1;
    }

    /* Gemeenschappelijke stijlen voor elke helft */
    .choice {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(32px, 5vw, 64px) clamp(20px, 3vw, 48px);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: background 0.5s ease;
      cursor: pointer;
    }
    .choice::before {
      /* zachte accent-lens die verschijnt op hover */
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .choice:hover::before { opacity: 1; }

    /* Klassieke helft — licht, serif */
    .choice-klassiek {
      background: var(--klassiek-bg);
      color: var(--klassiek-fg);
    }
    .choice-klassiek::before {
      background: radial-gradient(circle at center, color-mix(in srgb, var(--klassiek-accent) 9%, transparent) 0%, transparent 60%);
    }

    /* Nieuwe helft — donker, display */
    .choice-nieuw {
      background: var(--bg);
      color: var(--fg);
    }
    .choice-nieuw::before {
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent) 14%, transparent) 0%, transparent 60%);
    }

    /* ---------- Name-typography (dit is de "knop") ---------- */
    .name {
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.5s cubic-bezier(0.5, 0, 0.2, 1);
      text-align: center;
    }
    .choice:hover .name { transform: translateY(-4px); }

    /* Klassieke naam — Playfair Display italic */
    .name-klassiek {
      font-family: 'Playfair Display', 'Cardo', Georgia, serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(40px, 7vw, 88px);
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--klassiek-fg);
    }
    .name-klassiek-line-1 { display: block; }
    .name-klassiek-line-2 {
      display: block;
      font-size: 0.68em;
      margin-top: 0.12em;
      color: color-mix(in srgb, var(--klassiek-fg) 88%, transparent);
    }
    .name-klassiek-sub {
      display: block;
      margin-top: 22px;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: clamp(13px, 1.3vw, 15px);
      letter-spacing: 0.03em;
      color: color-mix(in srgb, var(--klassiek-fg) 55%, transparent);
    }

    /* Nieuwe naam — Archivo Black, lowercase met ogen op OO */
    .name-nieuw {
      font-family: 'Archivo Black', sans-serif;
      font-weight: 900;
      text-transform: lowercase;
      letter-spacing: -0.025em;
      line-height: 0.92;
      color: var(--fg);
    }
    .name-nieuw-line-1 {
      display: block;
      font-size: clamp(52px, 9vw, 112px);
    }
    .name-nieuw-line-2 {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.02em;
      font-size: clamp(34px, 5.6vw, 66px);
      margin-top: 0.1em;
    }
    .eye {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.82em;
      height: 0.82em;
      border-radius: 50%;
      background: var(--fg);
      position: relative;
      margin: 0 -0.02em;
    }
    .eye::after {
      content: '';
      width: 34%;
      height: 34%;
      border-radius: 50%;
      background: var(--accent);
      transition: transform 0.3s ease;
    }
    .choice-nieuw:hover .eye::after { transform: scale(1.15); }
    .name-nieuw-sub {
      display: block;
      margin-top: 28px;
      font-family: 'Archivo', sans-serif;
      font-size: clamp(10px, 1vw, 12px);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ---------- Cue bij hover: kleine pijl boven de naam ---------- */
    .choice-cue {
      position: absolute;
      top: clamp(24px, 4vw, 48px);
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      font-family: 'Archivo Black', sans-serif;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 2;
    }
    .choice:hover .choice-cue {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .choice-klassiek .choice-cue { color: var(--klassiek-accent); }
    .choice-nieuw .choice-cue { color: var(--accent); }

    /* ---------- Bottom hint ---------- */
    .splash-hint {
      padding-top: 16px;
      display: flex;
      justify-content: center;
      font-family: 'Archivo', sans-serif;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 720px) {
      .splash-stage {
        grid-template-columns: 1fr;
      }
      .splash-divider {
        top: 50%;
        bottom: auto;
        left: 10%;
        right: 10%;
        width: auto;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
        transform: translateY(-50%);
      }
      .choice { padding: clamp(48px, 10vw, 80px) 20px; }
      .name-klassiek { font-size: clamp(38px, 9vw, 56px); }
      .name-nieuw-line-1 { font-size: clamp(46px, 11vw, 72px); }
      .name-nieuw-line-2 { font-size: clamp(28px, 7vw, 44px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .choice, .choice::before, .name, .choice-cue, .eye::after {
        transition: none;
      }
      .choice:hover .name { transform: none; }
    }
  </style>
</head>
<body>

  <div class="splash">
    <header class="splash-topbar" aria-label="Versiekeuze">
      <span class="splash-topbar-left">
        <span class="splash-dot" aria-hidden="true"></span>
        Janusrvk.com
      </span>
      <span>Twee versies · één persoon</span>
    </header>

    <main class="splash-stage" aria-label="Kies een versie">
      <div class="splash-divider" aria-hidden="true"></div>

      <a class="choice choice-klassiek" href="/klassiek/" aria-label="Bekijk de klassieke versie van de site">
        <span class="choice-cue">↗ bezoek</span>
        <span class="name name-klassiek">
          <span class="name-klassiek-line-1">Janus</span>
          <span class="name-klassiek-line-2">van Koolwijk</span>
          <span class="name-klassiek-sub">Redacteur &amp; Schrijver · Amsterdam</span>
        </span>
      </a>

      <a class="choice choice-nieuw" href="/nieuw.html" aria-label="Bekijk de nieuwe versie van de site">
        <span class="choice-cue">↗ bezoek</span>
        <span class="name name-nieuw">
          <span class="name-nieuw-line-1">janus</span>
          <span class="name-nieuw-line-2">
            van&nbsp;k<span class="eye" aria-hidden="true"></span><span class="eye" aria-hidden="true"></span>lwijk
          </span>
          <span class="name-nieuw-sub">redacteur · schrijver · amsterdam</span>
        </span>
      </a>
    </main>

    <footer class="splash-hint">
      <span>Klik op een naam om die versie te openen</span>
    </footer>
  </div>

  <script>
    // Pupillen in de nieuwe-versie "ogen" volgen de muis — klein speels detail
    (function () {
      const eyes = document.querySelectorAll('.choice-nieuw .eye');
      if (!eyes.length) return;
      const onMove = (e) => {
        eyes.forEach((eye) => {
          const r = eye.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;
          const dist = Math.min(Math.hypot(dx, dy) / 60, 1);
          const max = r.width * 0.18;
          const tx = (dx / (Math.hypot(dx, dy) || 1)) * max * dist;
          const ty = (dy / (Math.hypot(dx, dy) || 1)) * max * dist;
          eye.style.setProperty('--px', tx + 'px');
          eye.style.setProperty('--py', ty + 'px');
        });
      };
      window.addEventListener('mousemove', onMove, { passive: true });
    })();
  </script>

  <style>
    .choice-nieuw .eye::after {
      transform: translate(var(--px, 0), var(--py, 0));
      transition: none;
    }
    .choice-nieuw:hover .eye::after {
      transform: translate(var(--px, 0), var(--py, 0)) scale(1.15);
    }
  </style>

  <script data-goatcounter="https://janusrvk.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
