<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Spotify-archief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1DB954;
    --green-dim: #158a3e;
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --surface3: #2a2a2a;
    --text: #ffffff;
    --text-muted: #a0a0a0;
    --text-faint: #555555;
    --border: #2c2c2c;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    padding: 56px 32px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  .header-eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    margin-bottom: 12px;
  }

  .header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
  }

  .header-sub {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Section container ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* ── Bar chart ── */
  .chart-section {
    margin-bottom: 56px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 20px;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .bar-year-label {
    width: 38px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    text-align: right;
  }

  .bar-track {
    flex: 1;
    background: var(--surface2);
    border-radius: 3px;
    height: 28px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    min-width: 2px;
  }

  .bar-row:hover .bar-fill { opacity: 0.85; }

  .bar-count {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    width: 64px;
    flex-shrink: 0;
    text-align: right;
  }

  /* ── Year sections ── */
  .years-section {  }

  .year-block {
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .year-block.open { border-color: #383838; }

  .year-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    cursor: pointer;
    background: var(--surface);
    user-select: none;
    transition: background 0.15s;
  }

  .year-header:hover { background: var(--surface2); }

  .year-header-left {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .year-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .year-plays {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .year-chevron {
    width: 20px;
    height: 20px;
    color: var(--text-faint);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
  }

  .year-block.open .year-chevron { transform: rotate(180deg); }

  .year-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .year-body-inner {
    padding: 8px 16px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── Month sections ── */
  .month-block {
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .month-block.open { border-color: var(--border); }

  .month-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    border-radius: 8px;
    transition: background 0.15s;
  }

  .month-header:hover { background: var(--surface2); }
  .month-block.open .month-header { border-radius: 8px 8px 0 0; background: var(--surface2); }

  .month-header-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .month-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .month-count {
    font-size: 12px;
    color: var(--text-muted);
  }

  .month-chevron {
    width: 16px;
    height: 16px;
    color: var(--text-faint);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
  }

  .month-block.open .month-chevron { transform: rotate(180deg); }

  .month-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .month-body-inner {
    padding: 16px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 600px) {
    .month-body-inner { grid-template-columns: 1fr; }
    .header { padding: 32px 20px 28px; }
    .main { padding: 0 16px 60px; }
  }

  /* ── Track list ── */
  .list-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 12px;
  }

  .track-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .track-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .track-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-faint);
    width: 18px;
    flex-shrink: 0;
    padding-top: 2px;
    text-align: right;
  }

  .track-info {
    min-width: 0;
  }

  .track-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .track-artist {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  /* ── Album list ── */
  .album-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .album-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .album-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-faint);
    width: 18px;
    flex-shrink: 0;
    padding-top: 2px;
    text-align: right;
  }

  .album-info {
    min-width: 0;
  }

  .album-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .album-artist {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .album-meta {
    font-size: 11px;
    color: var(--green);
    font-weight: 500;
    margin-top: 1px;
    display: block;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 40px 32px;
    font-size: 12px;
    color: var(--text-faint);
    border-top: 1px solid var(--border);
    max-width: 900px;
    margin: 0 auto;
  }
</style>
</head>

<div id="lockScreen" style="position:fixed;inset:0;background:#0f0f0f;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:Inter,sans-serif;">
  <div style="color:#1DB954;font-size:32px;">♫</div>
  <div style="color:#fff;font-size:18px;font-weight:600;">Spotify-archief</div>
  <input id="pinInput" type="password" inputmode="numeric" placeholder="Wachtwoord" autofocus
    style="background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:20px;padding:12px 20px;text-align:center;outline:none;width:180px;letter-spacing:4px;"
    onkeydown="if(event.key==='Enter')checkPin()">
  <div id="pinError" style="color:#e05555;font-size:13px;min-height:18px;"></div>
</div>
<script>
  function checkPin() {
    if (document.getElementById('pinInput').value === '7666') {
      document.getElementById('lockScreen').style.display = 'none';
    } else {
      document.getElementById('pinError').textContent = 'Onjuist wachtwoord';
      document.getElementById('pinInput').value = '';
    }
  }
</script>

const DUTCH_MONTHS = [
  'januari','februari','maart','april','mei','juni',
  'juli','augustus','september','oktober','november','december'
];

function formatPlays(n) {
  return n.toLocaleString('nl-NL');
}

function msToMinutes(ms) {
  return Math.round(ms / 60000);
}

// ── Build bar chart ──
function buildBarChart() {
  const byYear = STATS.byYear;
  const years = Object.keys(byYear).sort();
  const max = Math.max(...Object.values(byYear));
  const container = document.getElementById('barChart');

  years.forEach(year => {
    const plays = byYear[year];
    const pct = (plays / max) * 100;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.setAttribute('data-year', year);
    row.innerHTML = `
      <span class="bar-year-label">${year}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct.toFixed(2)}%"></div>
      </div>
      <span class="bar-count">${formatPlays(plays)}</span>
    `;
    row.addEventListener('click', () => scrollToYear(year));
    container.appendChild(row);
  });
}

function scrollToYear(year) {
  const el = document.getElementById('year-' + year);
  if (!el) return;
  // Open year if closed
  if (!el.classList.contains('open')) toggleYear(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Toggle helpers ──
function toggleYear(block) {
  const body = block.querySelector('.year-body');
  const isOpen = block.classList.toggle('open');
  if (isOpen) {
    body.style.maxHeight = body.scrollHeight + 'px';
  } else {
    body.style.maxHeight = '0';
  }
}

function toggleMonth(block) {
  const body = block.querySelector('.month-body');
  const isOpen = block.classList.toggle('open');
  if (isOpen) {
    body.style.maxHeight = body.scrollHeight + 'px';
    // Also update parent year body height
    const yearBody = block.closest('.year-body');
    if (yearBody) yearBody.style.maxHeight = yearBody.scrollHeight + body.scrollHeight + 'px';
  } else {
    body.style.maxHeight = '0';
  }
}

// ── Build year/month blocks ──
function buildYears() {
  const byYear = STATS.byYear;
  const years = Object.keys(byYear).sort().reverse();
  const container = document.getElementById('yearsSection');

  // Gather all months
  const allMonths = Object.keys(MONTH_COUNTS).sort().reverse();

  years.forEach(year => {
    const months = allMonths.filter(m => m.startsWith(year + '-'));
    if (months.length === 0) return;

    const plays = byYear[year];
    const block = document.createElement('div');
    block.className = 'year-block';
    block.id = 'year-' + year;

    // Build months HTML
    let monthsHTML = '';
    months.forEach(monthKey => {
      const [y, mIdx] = monthKey.split('-');
      const monthName = DUTCH_MONTHS[parseInt(mIdx, 10) - 1];
      const count = MONTH_COUNTS[monthKey] || 0;
      const trackData = TRACKS[monthKey] || [];
      const albumData = ALBUMS[monthKey] || [];

      // Tracks HTML
      let tracksHTML = '';
      if (trackData.length > 0) {
        const items = trackData.map((t, i) => `
          <li class="track-item">
            <span class="track-num">${i + 1}</span>
            <span class="track-info">
              <span class="track-name">${escHtml(t.track)}</span>
              <span class="track-artist">${escHtml(t.artist)}</span>
            </span>
          </li>`).join('');
        tracksHTML = `<div>
          <div class="list-section-title">Top tracks</div>
          <ul class="track-list">${items}</ul>
        </div>`;
      }

      // Albums HTML
      let albumsHTML = '';
      if (albumData.length > 0) {
        const items = albumData.map((a, i) => {
          let meta = '';
          if (a.msPlayed) {
            meta = `<span class="album-meta">${msToMinutes(a.msPlayed)} min</span>`;
          } else if (a.trackCount) {
            meta = `<span class="album-meta">${a.trackCount} nummers</span>`;
          }
          return `<li class="album-item">
            <span class="album-num">${i + 1}</span>
            <span class="album-info">
              <span class="album-name">${escHtml(a.album)}</span>
              <span class="album-artist">${escHtml(a.artist)}</span>
              ${meta}
            </span>
          </li>`;
        }).join('');
        albumsHTML = `<div>
          <div class="list-section-title">Top albums</div>
          <ul class="album-list">${items}</ul>
        </div>`;
      }

      monthsHTML += `
        <div class="month-block" id="month-${monthKey}">
          <div class="month-header" onclick="toggleMonth(this.closest('.month-block'))">
            <div class="month-header-left">
              <span class="month-name">${monthName}</span>
              <span class="month-count">${count} nummers</span>
            </div>
            <svg class="month-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="month-body">
            <div class="month-body-inner">
              ${tracksHTML}
              ${albumsHTML}
            </div>
          </div>
        </div>`;
    });

    block.innerHTML = `
      <div class="year-header" onclick="toggleYear(this.closest('.year-block'))">
        <div class="year-header-left">
          <span class="year-title">${year}</span>
          <span class="year-plays">${formatPlays(plays)} afspeelbeurten</span>
        </div>
        <svg class="year-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="year-body">
        <div class="year-body-inner">
          ${monthsHTML}
        </div>
      </div>`;

    container.appendChild(block);
  });
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Open most recent year ──
function openMostRecentYear() {
  const allYears = Object.keys(STATS.byYear).sort().reverse();
  for (const year of allYears) {
    const el = document.getElementById('year-' + year);
    if (el) {
      toggleYear(el);
      break;
    }
  }
}

// ── Init ──
buildBarChart();
buildYears();
openMostRecentYear();
</script>
